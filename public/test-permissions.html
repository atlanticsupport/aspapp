<!DOCTYPE html>
<html>
<head>
    <title>Test Permissions</title>
</head>
<body>
    <h1>Teste de Permissões</h1>
    <button onclick="testLogin()">Fazer Login</button>
    <button onclick="checkPermissions()">Verificar Permissões</button>
    <button onclick="clearStorage()">Limpar Storage</button>
    <pre id="output"></pre>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('/api/rpc', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        rpc: 'rpc_login',
                        params: {
                            p_username: 'admin',
                            p_password: 'admin123'
                        }
                    })
                });
                
                const data = await response.json();
                document.getElementById('output').textContent = JSON.stringify(data, null, 2);
                
                if (data.data && data.data[0]) {
                    localStorage.setItem('aspapp_session', JSON.stringify(data.data[0]));
                    console.log('Login successful, user saved to localStorage');
                }
            } catch (error) {
                console.error('Login error:', error);
            }
        }
        
        function checkPermissions() {
            const session = localStorage.getItem('aspapp_session');
            if (session) {
                const user = JSON.parse(session);
                const output = {
                    username: user.username,
                    role: user.role,
                    transit_access: user.transit_access,
                    stock_out_access: user.stock_out_access,
                    logistics_access: user.logistics_access,
                    inventory_access: user.inventory_access,
                    all_keys: Object.keys(user).filter(k => k.includes('access') || k.startsWith('view_'))
                };
                document.getElementById('output').textContent = JSON.stringify(output, null, 2);
            } else {
                document.getElementById('output').textContent = 'No session found';
            }
        }
        
        function clearStorage() {
            localStorage.removeItem('aspapp_session');
            document.getElementById('output').textContent = 'Storage cleared';
        }
    </script>
</body>
</html>
