<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Importações - ASP Stock</title>
    <link rel="stylesheet" href="css/modules/base.css">
    <link rel="stylesheet" href="css/modules/components.css">
    <link rel="stylesheet" href="css/modules/dialogs.css">
    <link rel="stylesheet" href="css/modules/import-history.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="page-header">
            <h1>📋 Histórico de Importações</h1>
            <p>Visualize e gerencie todas as importações de Excel realizadas</p>
        </header>

        <main class="main-content">
            <div id="import-history-container">
                <div class="loading">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>A carregar histórico...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { loadImportHistory } from './js/modules/import-history.js';
        
        // Load history when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadImportHistory();
        });
    </script>
</body>
</html>
