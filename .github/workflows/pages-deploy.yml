name: Cloudflare Pages Deploy

on:
    push:
        branches:
            - main
            - staging
    workflow_dispatch:

permissions:
    contents: read
    deployments: write

concurrency:
    group: pages-deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        if: github.ref_name == 'main' || github.ref_name == 'staging'
        name: Deploy ${{ github.ref_name }}
        runs-on: ubuntu-latest
        env:
            DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
            GITHUB_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: false

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Deploy to Cloudflare Pages
              run: node scripts/pages-deploy.mjs $DEPLOY_ENV
